<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таңдаулылар - College Teacher Rating</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-graduation-cap"></i>
            <span>TeacherRating</span>
        </div>
        <div class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i> Басты бет</a>
            <a href="favorites.html" class="active"><i class="fas fa-heart"></i> Таңдаулылар</a>
            <a href="analytics.html"><i class="fas fa-chart-bar"></i> Аналитика</a>
            <a href="admin.html" id="admin-link" style="display:none;"><i class="fas fa-cog"></i> Админ</a>
        </div>
        <div class="nav-auth">
            <div id="user-info" style="display:none;">
                <img id="user-avatar" src="" alt="avatar">
                <span id="user-name"></span>
                <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            <div id="auth-buttons">
                <a href="login.html" class="btn btn-outline">Кіру</a>
                <a href="register.html" class="btn btn-primary">Тіркелу</a>
            </div>
        </div>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
            <i class="fas fa-bars"></i>
        </button>
    </nav>

    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html"><i class="fas fa-home"></i> Басты бет</a>
        <a href="favorites.html" class="active"><i class="fas fa-heart"></i> Таңдаулылар</a>
        <a href="analytics.html"><i class="fas fa-chart-bar"></i> Аналитика</a>
        <a href="admin.html" id="mobile-admin-link" style="display:none;"><i class="fas fa-cog"></i> Админ</a>
    </div>

    <main class="main-content">
        <section class="favorites-section">
            <div class="section-header">
                <h2><i class="fas fa-heart"></i> Таңдаулылар</h2>
                <span id="fav-count">0 оқытушы</span>
            </div>
            <div class="teachers-grid" id="favorites-grid">
                <div class="empty-state">
                    <i class="fas fa-heart-broken"></i>
                    <h3>Таңдаулылар бос</h3>
                    <p>Оқытушыларды таңдаулыларға қосу үшін жүрек белгішесін басыңыз</p>
                    <a href="index.html" class="btn btn-primary">Оқытушыларды қарау</a>
                </div>
            </div>
        </section>
    </main>

    <div class="modal" id="teacher-modal">
        <div class="modal-content modal-large">
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <div class="teacher-detail" id="teacher-detail"></div>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toast-message"></span>
    </div>

    <footer class="footer">
        <p>© 2026 College Teacher Rating System. Барлық құқықтар қорғалған.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
    <script src="favorites.js"></script>
</body>
</html>
